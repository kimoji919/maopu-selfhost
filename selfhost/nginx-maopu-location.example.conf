# Put these locations in the same Nginx server block that NATAPP forwards to.
# With this layout, the old service keeps receiving / on local port 8787, while
# Cat Spectrum receives only /maopu/api/ on local port 8788.

location = /maopu/api {
    return 308 /maopu/api/;
}

location ^~ /maopu/api/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Keep this only if the existing app is not already handled elsewhere in the
# same server block.
location / {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
